version: '3.8'

services:
  db:
    image: pgrouting/pgrouting:latest
    container_name: srsms_db
    environment:
      POSTGRES_USER: srsms_user
      POSTGRES_PASSWORD: srsms_password
      POSTGRES_DB: srsms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: srsms_backend
    ports:
      - "3080:3000"
    environment:
      - DATABASE_URL=postgres://srsms_user:srsms_password@db:5432/srsms
      - JWT_SECRET=super_secret_jwt_key_srsms
      - ANALYTICS_SERVICE_URL=http://analytics:8000
    depends_on:
      - db
    restart: unless-stopped

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: srsms_analytics
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://srsms_user:srsms_password@db:5432/srsms
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: srsms_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
